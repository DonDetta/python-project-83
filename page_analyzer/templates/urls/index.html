{% extends 'base.html' %}

{% block title %}Сайты{% endblock %}

{% block content %}
<div class="container mt-4">
    <h1 class="mb-4">Сайты</h1>
    <table class="table table-bordered" data-test="urls">
        <thead>
            <tr>
                <th>ID</th>
                <th>Название</th>
                <th>Дата последней проверки</th>
                <th>Код ответа</th>
            </tr>
        </thead>
        <tbody>
            {% for url in urls %}
            <tr>
                <td>{{ url[0] }}</td>
                <td>
                    <a href="{{ url_for('urls_show', id=url[0]) }}">{{ url[1] }}</a>
                </td>
                <td>{{ url[2] or '' }}</td>
                <td>{{ url[3] or '' }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
